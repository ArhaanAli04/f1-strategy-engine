# Alertmanager routing/receivers — companion to alerts.yml's severity labels.
#
# Slack webhook URLs and the PagerDuty key are secrets (unlike the metrics
# basic_auth password in prometheus.yml, which is an accepted local-dev
# default) — they must never be committed in plaintext here. Each receiver
# below reads its credential from a file instead of an inline value; Day 12's
# docker-compose wiring is responsible for writing SLACK_WEBHOOK_CRITICAL,
# SLACK_WEBHOOK_WARNING, and PAGERDUTY_INTEGRATION_KEY (all from .env) into
# these paths at container start (see infra/docker/docker-compose.yml).

global:
  resolve_timeout: 5m

route:
  receiver: slack-warning
  group_by: ["alertname"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    - matchers:
        - severity = "critical"
      receiver: slack-critical
    - matchers:
        - severity = "warning"
      receiver: slack-warning
    - matchers:
        - severity = "pagerduty"
      receiver: pagerduty-oncall
      repeat_interval: 15m

receivers:
  - name: slack-critical
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack_webhook_critical
        channel: "#alerts-critical"
        send_resolved: true
        title: '{{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'

  - name: slack-warning
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack_webhook_warning
        channel: "#alerts-warning"
        send_resolved: true
        title: '{{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'

  # Inert until PAGERDUTY_INTEGRATION_KEY is a real key and a Kubernetes
  # cluster feeds kube_pod_container_status_restarts_total — see alerts.yml's
  # PodRestartsHigh rule and CLAUDE.md's checklist (Day 22).
  - name: pagerduty-oncall
    pagerduty_configs:
      - service_key_file: /etc/alertmanager/secrets/pagerduty_integration_key
        send_resolved: true
        description: '{{ .CommonAnnotations.summary }}'
